<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>40K Reference – 11ª Edición</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a35;
      --accent: #c0392b;
      --accent2: #e74c3c;
      --gold: #c9a84c;
      --text: #e8e8ec;
      --text-muted: #888899;
      --phase-cmd: #8e44ad;
      --phase-mov: #2980b9;
      --phase-shoot: #c0392b;
      --phase-charge: #d35400;
      --phase-fight: #c0392b;
      --phase-morale: #27ae60;
      --phase-kw: #16a085;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #0d0d0f 0%, #1a0a0a 100%);
      border-bottom: 2px solid var(--accent);
      padding: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .skull-icon {
      font-size: 24px;
      filter: drop-shadow(0 0 6px var(--accent));
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--gold);
      text-transform: uppercase;
    }

    h1 span {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 400;
      display: block;
      letter-spacing: 2px;
    }

    /* SEARCH */
    .search-wrap {
      position: relative;
    }

    #search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px 10px 40px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }

    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text-muted); }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 16px;
    }

    /* PHASE FILTER */
    .phases {
      display: flex;
      gap: 6px;
      padding: 12px 16px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .phases::-webkit-scrollbar { display: none; }

    .phase-btn {
      white-space: nowrap;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .phase-btn.active,
    .phase-btn:hover {
      color: var(--text);
      border-color: currentColor;
    }

    .phase-btn[data-phase="all"].active    { background: var(--accent); border-color: var(--accent); color: #fff; }
    .phase-btn[data-phase="comando"].active  { background: var(--phase-cmd); border-color: var(--phase-cmd); color: #fff; }
    .phase-btn[data-phase="movimiento"].active { background: var(--phase-mov); border-color: var(--phase-mov); color: #fff; }
    .phase-btn[data-phase="disparo"].active  { background: var(--phase-shoot); border-color: var(--phase-shoot); color: #fff; }
    .phase-btn[data-phase="carga"].active    { background: var(--phase-charge); border-color: var(--phase-charge); color: #fff; }
    .phase-btn[data-phase="combate"].active  { background: var(--phase-fight); border-color: var(--phase-fight); color: #fff; }
    .phase-btn[data-phase="moral"].active    { background: var(--phase-morale); border-color: var(--phase-morale); color: #fff; }
    .phase-btn[data-phase="keywords"].active { background: var(--phase-kw); border-color: var(--phase-kw); color: #fff; }

    /* MAIN */
    main {
      padding: 12px 16px 80px;
      max-width: 720px;
      margin: 0 auto;
    }

    .results-info {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
      letter-spacing: .5px;
    }

    /* RULE CARD */
    .rule-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color .2s;
    }

    .rule-card:hover { border-color: #444; }

    .rule-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
    }

    .phase-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .rule-title {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
    }

    .phase-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 10px;
      opacity: .8;
    }

    .chevron {
      color: var(--text-muted);
      font-size: 12px;
      transition: transform .2s;
      flex-shrink: 0;
    }

    .rule-card.open .chevron { transform: rotate(180deg); }

    .rule-body {
      display: none;
      padding: 0 14px 14px;
    }

    .rule-card.open .rule-body { display: block; }

    .rule-desc {
      font-size: 14px;
      line-height: 1.6;
      color: #ccc;
      margin-bottom: 12px;
    }

    .rule-example {
      background: var(--surface2);
      border-left: 3px solid var(--gold);
      border-radius: 0 6px 6px 0;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-muted);
    }

    .rule-example strong {
      color: var(--gold);
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .rule-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 10px;
    }

    .tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      letter-spacing: .5px;
    }

    /* NO RESULTS */
    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .no-results .icon { font-size: 40px; margin-bottom: 12px; }
    .no-results p { font-size: 14px; }

    /* COLORS BY PHASE */
    [data-phase="comando"]   .phase-dot { background: var(--phase-cmd); }
    [data-phase="movimiento"] .phase-dot { background: var(--phase-mov); }
    [data-phase="disparo"]   .phase-dot { background: var(--phase-shoot); }
    [data-phase="carga"]     .phase-dot { background: var(--phase-charge); }
    [data-phase="combate"]   .phase-dot { background: var(--phase-fight); }
    [data-phase="moral"]     .phase-dot { background: var(--phase-morale); }
    [data-phase="keywords"]  .phase-dot { background: var(--phase-kw); }

    [data-phase="comando"]   .phase-badge { background: #8e44ad33; color: #c39bd3; }
    [data-phase="movimiento"] .phase-badge { background: #2980b933; color: #85c1e9; }
    [data-phase="disparo"]   .phase-badge { background: #c0392b33; color: #f1948a; }
    [data-phase="carga"]     .phase-badge { background: #d3540033; color: #f0b27a; }
    [data-phase="combate"]   .phase-badge { background: #c0392b33; color: #f1948a; }
    [data-phase="moral"]     .phase-badge { background: #27ae6033; color: #82e0aa; }
    [data-phase="keywords"]  .phase-badge { background: #16a08533; color: #76d7c4; }

    .changed-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      padding: 1px 6px;
      border-radius: 8px;
      background: #c9a84c22;
      color: var(--gold);
      border: 1px solid #c9a84c44;
      margin-left: 6px;
      vertical-align: middle;
    }
    .new-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      padding: 1px 6px;
      border-radius: 8px;
      background: #16a08522;
      color: #76d7c4;
      border: 1px solid #16a08544;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* HIGHLIGHT */
    mark {
      background: #c9a84c44;
      color: var(--gold);
      border-radius: 2px;
      padding: 0 1px;
    }

    /* FOOTER */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 16px;
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <span class="skull-icon">☠</span>
    <div>
      <h1>40K Reference <span>11ª Edición · Reglas Core</span></h1>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="search" placeholder="Buscar regla, fase o término..." autocomplete="off" />
  </div>
</header>

<div class="phases">
  <button class="phase-btn active" data-phase="all">Todas</button>
  <button class="phase-btn" data-phase="comando">⚔ Comando</button>
  <button class="phase-btn" data-phase="movimiento">👣 Movimiento</button>
  <button class="phase-btn" data-phase="disparo">🎯 Disparo</button>
  <button class="phase-btn" data-phase="carga">💨 Carga</button>
  <button class="phase-btn" data-phase="combate">⚡ Combate</button>
  <button class="phase-btn" data-phase="moral">🧠 Moral</button>
  <button class="phase-btn" data-phase="keywords">🔑 Keywords</button>
</div>

<main>
  <div class="results-info" id="results-info"></div>
  <div id="rules-list"></div>
</main>

<footer>FOR THE EMPEROR · 40K REF 11ª ED</footer>

// ── PHASE LABELS ──
const PHASE_LABELS = {
  all: "Todas",
  comando: "Comando",
  movimiento: "Movimiento",
  disparo: "Disparo",
  carga: "Carga",
  combate: "Combate",
  moral: "Moral",
  keywords: "Keywords"
};

// ── STATE ──
let activePhase = "all";
let searchQuery = "";

// ── HELPERS ──
function stripHtml(html) {
  return html.replace(/<[^>]+>/g, '');
}

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function matchesSearch(rule, query) {
  if (!query) return true;
  const q = query.toLowerCase();
  return (
    stripHtml(rule.title).toLowerCase().includes(q) ||
    stripHtml(rule.desc).toLowerCase().includes(q) ||
    rule.example.toLowerCase().includes(q) ||
    rule.tags.some(t => t.toLowerCase().includes(q)) ||
    PHASE_LABELS[rule.phase].toLowerCase().includes(q)
  );
}

function render() {
  const list = document.getElementById('rules-list');
  const info = document.getElementById('results-info');

  const filtered = RULES.filter(r => {
    const phaseOk = activePhase === 'all' || r.phase === activePhase;
    const searchOk = matchesSearch(r, searchQuery);
    return phaseOk && searchOk;
  });

  info.textContent = filtered.length === RULES.length
    ? `${RULES.length} reglas`
    : `${filtered.length} de ${RULES.length} reglas`;

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="no-results">
        <div class="icon">🎲</div>
        <p>No se encontraron reglas para "<strong>${searchQuery}</strong>"</p>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map((rule, i) => {
    const q = searchQuery;
    const titleHl = highlight(rule.title, q);
    const descHl  = highlight(rule.desc, q);
    const exHl    = highlight(rule.example, q);
    return `
      <div class="rule-card" data-phase="${rule.phase}" data-idx="${i}">
        <div class="rule-header">
          <span class="phase-dot"></span>
          <span class="rule-title">${titleHl}</span>
          <span class="phase-badge">${PHASE_LABELS[rule.phase]}</span>
          <span class="chevron">▼</span>
        </div>
        <div class="rule-body">
          <p class="rule-desc">${descHl}</p>
          <div class="rule-example">
            <strong>⚔ Ejemplo</strong>
            ${exHl}
          </div>
          <div class="rule-tags">${rule.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </div>`;
  }).join('');

  // Toggle open/close
  list.querySelectorAll('.rule-header').forEach(header => {
    header.addEventListener('click', () => {
      header.closest('.rule-card').classList.toggle('open');
    });
  });
}

// ── EVENTS ──
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

document.querySelectorAll('.phase-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activePhase = btn.dataset.phase;
    render();
  });
});

// ── INIT ──
render();
</script>
